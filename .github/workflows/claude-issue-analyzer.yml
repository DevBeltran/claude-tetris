name: Claude Issue Analyzer

on:
  issues:
    types: [opened, edited]

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Analyze this GitHub issue for the Tetris game project and take two actions:

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

            Project context: This is a browser-based Tetris game with 3 files (index.html, style.css, game.js ~305 lines). No build step, no dependencies.

            Step 1 — Apply labels using `gh issue edit`:
            Choose the most fitting labels from: bug, enhancement, question, documentation, help-wanted, good-first-issue
            Run: gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label "<chosen-labels>"

            Step 2 — Post a diagnosis comment using `gh issue comment`:
            Write a concise technical diagnosis in Spanish that includes:
            - **Tipo de issue**: (bug / mejora / pregunta / etc.)
            - **Área afectada**: which file(s) and function(s) are likely involved
            - **Diagnóstico**: root cause or intent analysis
            - **Pasos sugeridos para la solución**: concrete implementation steps

            Run: gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "<diagnosis>"